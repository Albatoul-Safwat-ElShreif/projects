<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>session1</title>
</head>
<body>
    <h1>Task for week one</h1>
    <form action="">
        <fieldset>
            <legend>Personal Info</legend>

            <label >First name
                <input type="text" required maxlength="20">
            </label><br>

            <label >email
                <input type="email" required placeholder="example@gmail.com">
            </label><br>

            <label>Password
                <input type="password" required minlength="8">
            </label><br>

        </fieldset>
        <fieldset>
            <legend>Extra data</legend>
            <label >Gender
                <input type="radio" name="gender" value="male">Male
                <input type="radio" name="gender" value="female">Female
            </label><br>
            
            <label >
                <input type="checkbox">
                under age 18
            </label>
        </fieldset>
        <input type="submit">
        <input type="reset">
    </form>
    <br><br>

    <img src="moon.jpg"  alt="moon light  in sky" width="300" height="300">
    <video src="moon.mp4" controls width=300px height=200px></video>
</body>
</html>
